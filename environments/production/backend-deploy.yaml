apiVersion: apps/v1
kind: Deployment
metadata:
  name: retail-backend
  namespace: production
  labels:
    app: retail-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: retail-backend
  template:
    metadata:
      labels:
        app: retail-backend
    spec:
      containers:
      - name: api
        image: 154290454465.dkr.ecr.ap-south-1.amazonaws.com/retail-backend:latest # Replace with your ECR Repository URI
        ports:
        - containerPort: 8080
        env:
        - name: DB_HOST
          value: "production-postgres-db.c123456789.us-east-1.rds.amazonaws.com" # Replace with your Terraform RDS endpoint output
        - name: DB_NAME
          value: "retail_prod"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://opentelemetry-collector.monitoring.svc.cluster.local:4317"
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: app-db-credentials
              key: DB_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-db-credentials
              key: DB_PASSWORD
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "250m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: retail-backend-service
  namespace: production
spec:
  type: ClusterIP # Kept private inside the cluster network bounds
  selector:
    app: retail-backend
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080
